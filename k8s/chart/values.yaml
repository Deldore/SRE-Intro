global:
  imagePullSecrets:
    - ghcr-secret

gateway:
  replicas: 1
  image: ghcr.io/deldore/quickticket-gateway:e1f66611ec19ecdca827d786e1011bf94e15dbd1
  version: "v2"
  timeoutMs: "5000"

events:
  replicas: 1
  image: ghcr.io/deldore/quickticket-events:e1f66611ec19ecdca827d786e1011bf94e15dbd1
  db:
    host: postgres
    port: 5432
    name: quickticket
    user: quickticket
    password: quickticket
  redis:
    host: redis
    port: "6379"
  dbMaxConns: "10"
  redisTimeoutMs: "1000"
  reservationTtl: "300"

payments:
  replicas: 1
  image: ghcr.io/deldore/quickticket-payments:e1f66611ec19ecdca827d786e1011bf94e15dbd1
  failureRate: "0.0"
  latencyMs: "0"
