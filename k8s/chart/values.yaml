  image: ghcr.io/deldore/quickticket-gateway:f2b83a901a5c5addea3b77a2fd624bf52cf8565e
  version: "v2"
  timeoutMs: "5000"

events:
  replicas: 1
  image: ghcr.io/deldore/quickticket-events:f2b83a901a5c5addea3b77a2fd624bf52cf8565e
